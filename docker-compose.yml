services:
  product_db:
    image: mysql:latest
    container_name: product_db
    ports:
    - "3306:3306"
    networks:
    - network-backend
    environment:
      MYSQL_DATABASE: product_db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    restart: always
    volumes:
    - product_db_data:/var/lib/mysql
    healthcheck: # Tests if the database is available. Ensure DB_USER in .env is NOT 'root'.
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: 'ruok'
    networks:
      - network-backend
    healthcheck:
      # cub zk-ready is a reliable Confluent utility for healthchecks
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "30"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy 
    ports: # Map both internal and external ports
      - "9092:9092"
      - "9093:9093"
    networks:
      - network-backend
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:9093 
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093 # Advertised listeners for internal and external access
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      # Tests if the broker is active by listing local topics on the internal port 9092
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092", "--version"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 45s

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: ecommerce-kafdrop
    depends_on:
      kafka:
        condition: service_healthy 
    ports:
      - "9000:9000" 
    networks:
      - network-backend
    environment:
      - KAFKA_BROKERCONNECT=kafka:9092 # Connects using the Kafka container name within the Docker internal network
      - JVM_OPTS=-Xms32M -Xmx64M # Limits Kafdrop memory usage
      - SERVER_PORT=9000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  network-backend:
    driver: bridge
    name: network-backend
    external: true

volumes:
  product_db_data:
  kafka_data:
    